env:
  action_dims: [2, 4, 8]
  n_data: 20000
  offsets:
    mediocre: 0.8
    bad: 5.0
  stds:
    good: 0.10
    mediocre: 0.40
    bad: 0.20
  weights:
    good: 0.20
    mediocre_pos: 0.15
    mediocre_neg: 0.15
    bad_pos: 0.25
    bad_neg: 0.25
  good_mode_ids: [0]
  bad_mode_ids: [3, 4]
  mean_shift: 0.0
  reward_center_shift: 0.0
  anisotropy_ratio: 1.0
  rotation_deg: 0.0

scenario:
  name: baseline
  level: moderate

corruption:
  q_noise_std: 0.0
  q_bias_bad: 0.0
  bad_spike_prob: 0.0
  bad_spike_value: 0.0

training:
  lr: 0.003
  batch_size: 256
  epochs: 60
  steps_per_epoch: 12

kl:
  alpha: 0.20

kl_reverse:
  alpha: 0.20
  beta: 0.10

ot:
  lambdas: [0.03, 0.05, 0.1, 0.3, 1.0]
  lam_q: 1.0
  unbalanced_reg: 0.08
  unbalanced_reg_m: 0.40
  batch_size: 96
  sinkhorn_reg: 0.08
  sinkhorn_iter: 100

ot_partial:
  lambdas: [0.03, 0.05, 0.1, 0.3, 1.0]
  w: 2.0
  mass_fraction: 2.0
  pot_hidden_dim: 128
  pot_lr: 0.0003
  pot_steps_per_batch: 1
  pot_weight_decay: 0.0001
  pot_output_nonnegative: true

l2_constraint:
  lam: 1.0
  anchor_mode: dataset_action
  anchor_noise_std: 0.0
  lambdas: [0.03, 0.05, 0.1, 0.3, 1.0]

eval:
  n_eval_samples: 10000
  recall_radius_mult: 1.2

experiment:
  seeds: [0, 1, 2]
